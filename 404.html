<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — NNS Ojo Alumni</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body { background: linear-gradient(135deg, #001a33 0%, #003366 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .error-wrap { max-width: 560px; }
    .error-number { font-family: 'Playfair Display', serif; font-size: clamp(6rem, 20vw, 12rem); font-weight: 900; color: transparent; -webkit-text-stroke: 3px rgba(255,215,0,0.4); line-height: 1; margin-bottom: 0; }
    .error-anchor { font-size: 4rem; display: block; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    .error-wrap h2 { color: #fff; font-size: clamp(1.4rem, 3vw, 2rem); margin-bottom: 14px; }
    .error-wrap p { color: rgba(255,255,255,0.6); font-size: 0.95rem; line-height: 1.7; margin-bottom: 36px; }
    .error-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-number">404</div>
    <span class="error-anchor">⚓</span>
    <h2>Lost at Sea</h2>
    <p>The page you're looking for doesn't exist or may have been moved. Let's get you back to shore.</p>
    <div class="error-actions">
      <a href="index.html" class="btn btn-gold">← Back to Home</a>
      <a href="contact.html" class="btn btn-outline">Contact Us</a>
    </div>
  </div>
</body>
</html>
